[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback so deep links (e.g. /#submit) resolve to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers — applied to every response.
# CSP allowlist covers Mapbox tiles/workers + Supabase REST + Supabase realtime (wss).
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.supabase.co https://*.supabase.in https://api.mapbox.com https://*.tiles.mapbox.com; font-src 'self' data:; connect-src 'self' https://api.mapbox.com https://*.tiles.mapbox.com https://events.mapbox.com https://*.supabase.co https://*.supabase.in wss://*.supabase.co wss://*.supabase.in; worker-src 'self' blob:; child-src blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
